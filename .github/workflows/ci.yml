name: Build and Push Docker Image CI

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push 될 때 실행
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        # GitHub Repo Settings > Secrets and variables > Actions 에서
        # DOCKER_USERNAME 과 DOCKER_PASSWORD 를 설정해야 합니다.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./mlops_api    # Dockerfile이 위치한 경로
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/age-predict-api:latest
          # 빌드 시간 단축을 위한 캐시 설정 추가 (최적화)
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-predict-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-predict-api:buildcache,mode=max
