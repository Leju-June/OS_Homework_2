name: Build and Push Docker Image CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push 될 때 실행
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        # GitHub Repo Settings > Secrets and variables > Actions 에서
        # DOCKERHUB_USERNAME 과 DOCKERHUB_TOKEN 를 설정해야 합니다.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./mlops_api    # Dockerfile이 위치한 경로
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/age-predict-api:latest
          # 빌드 시간 단축을 위한 캐시 설정 추가 (최적화)
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-predict-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-predict-api:buildcache,mode=max

  deploy-to-local:
    needs: build-and-push  # 빌드와 푸시가 완료된 후 실행
    runs-on: self-hosted   # 내 컴퓨터에 등록된 런너 사용

    steps:
      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ⬇️ Pull latest Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/age-predict-api:latest

      - name: 🛑 Stop and remove existing container
        continue-on-error: true
        run: |
          docker stop age-predict-api
          docker rm age-predict-api

      - name: 🚀 Run new container
        run: docker run -d -p 8000:8000 --name age-predict-api ${{ secrets.DOCKERHUB_USERNAME }}/age-predict-api:latest

